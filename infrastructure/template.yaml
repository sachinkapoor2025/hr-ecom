AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: HR E-Commerce — serverless stack (near-zero idle cost)

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, staging, prod]
  DomainName:
    Type: String
    Default: ""
  StripeSecretArn:
    Type: String
    Default: ""
  StripeSecretKey:
    Type: String
    Default: ""
    NoEcho: true
  StripeWebhookSecret:
    Type: String
    Default: ""
    NoEcho: true
  RazorpaySecretArn:
    Type: String
    Default: ""
  RazorpayKeyId:
    Type: String
    Default: ""
    NoEcho: true
  RazorpayKeySecret:
    Type: String
    Default: ""
    NoEcho: true
  SmtpPassword:
    Type: String
    Default: ""
    NoEcho: true
    Description: SMTP password for order@usarakhi.com (contact & order emails)
  UspsClientId:
    Type: String
    Default: ""
    NoEcho: true
  UspsClientSecret:
    Type: String
    Default: ""
    NoEcho: true
  UspsSecretArn:
    Type: String
    Default: ""
    Description: Optional Secrets Manager ARN with { clientId, clientSecret, ... }
  UspsBaseUrl:
    Type: String
    Default: "https://apis.usps.com"
  UspsCrid:
    Type: String
    Default: ""
  UspsMid:
    Type: String
    Default: ""
  UspsEpsAccountNumber:
    Type: String
    Default: ""
    NoEcho: true
  LoadTestMode:
    Type: String
    Default: "false"
    AllowedValues: ["true", "false"]
    Description: When true, stub Stripe/Razorpay/USPS/SMTP for k6 load tests (staging only)

Globals:
  Function:
    Runtime: nodejs20.x
    Timeout: 29
    MemorySize: 1024
    Architectures: [arm64]
    Environment:
      Variables:
        PRODUCTS_TABLE: !Ref ProductsTable
        ORDERS_TABLE: !Ref OrdersTable
        CARTS_TABLE: !Ref CartsTable
        CUSTOMERS_TABLE: !Ref CustomersTable
        EVENTS_TABLE: !Ref EventsTable
        CONFIG_TABLE: !Ref ConfigTable
        EMAIL_CAMPAIGNS_TABLE: !Ref EmailCampaignsTable
        REMINDER_EMAILS_TABLE: !Ref ReminderEmailsTable
        UPLOAD_BUCKET: !Ref UploadBucket
        USER_POOL_ID: !Ref UserPool
        USER_POOL_CLIENT_ID: !Ref UserPoolClient
        ENVIRONMENT: !Ref Environment
        LOAD_TEST_MODE: !Ref LoadTestMode
        STRIPE_SECRET_KEY: !Ref StripeSecretKey
        STRIPE_WEBHOOK_SECRET: !Ref StripeWebhookSecret
        RAZORPAY_SECRET_ARN: !Ref RazorpaySecretArn
        RAZORPAY_KEY_ID: !Ref RazorpayKeyId
        RAZORPAY_KEY_SECRET: !Ref RazorpayKeySecret
        CLOUDFRONT_DOMAIN: !GetAtt CloudFrontDistribution.DomainName
        SMTP_HOST: smtp.usarakhi.com
        SMTP_PORT: "465"
        SMTP_SECURE: "true"
        SMTP_USER: order@usarakhi.com
        SMTP_FROM: order@usarakhi.com
        NOTIFY_EMAIL: order@usarakhi.com,priya.yadav@mydgv.com
        SMTP_PASS: !Ref SmtpPassword
        SITE_URL: https://www.usarakhi.com
        SES_AWS_REGION: us-east-1
        SES_FROM_EMAIL: order@usarakhi.com
        SES_REPLY_TO: order@usarakhi.com
        USPS_CLIENT_ID: !Ref UspsClientId
        USPS_CLIENT_SECRET: !Ref UspsClientSecret
        USPS_SECRET_ARN: !Ref UspsSecretArn
        USPS_BASE_URL: !Ref UspsBaseUrl
        USPS_CRID: !Ref UspsCrid
        USPS_MID: !Ref UspsMid
        USPS_EPS_ACCOUNT_NUMBER: !Ref UspsEpsAccountNumber
        USPS_PAYMENT_AUTHORIZATION_TOKEN: !Ref UspsPaymentAuthorizationToken

Resources:
  ProductsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub hr-ecom-products-${Environment}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
        - AttributeName: GSI1PK
          AttributeType: S
        - AttributeName: GSI1SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: GSI1
          KeySchema:
            - AttributeName: GSI1PK
              KeyType: HASH
            - AttributeName: GSI1SK
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      SSESpecification:
        SSEEnabled: true

  OrdersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub hr-ecom-orders-${Environment}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
        - AttributeName: GSI1PK
          AttributeType: S
        - AttributeName: GSI1SK
          AttributeType: S
        - AttributeName: GSI2PK
          AttributeType: S
        - AttributeName: GSI2SK
          AttributeType: S
        - AttributeName: GSI3PK
          AttributeType: S
        - AttributeName: GSI3SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: GSI1
          KeySchema:
            - AttributeName: GSI1PK
              KeyType: HASH
            - AttributeName: GSI1SK
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: GSI2
          KeySchema:
            - AttributeName: GSI2PK
              KeyType: HASH
            - AttributeName: GSI2SK
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: GSI3
          KeySchema:
            - AttributeName: GSI3PK
              KeyType: HASH
            - AttributeName: GSI3SK
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      SSESpecification:
        SSEEnabled: true

  CartsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub hr-ecom-carts-${Environment}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
        - AttributeName: GSI1PK
          AttributeType: S
        - AttributeName: GSI1SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: GSI1
          KeySchema:
            - AttributeName: GSI1PK
              KeyType: HASH
            - AttributeName: GSI1SK
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      TimeToLiveSpecification:
        AttributeName: expiresAt
        Enabled: true
      SSESpecification:
        SSEEnabled: true

  CustomersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub hr-ecom-customers-${Environment}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
        - AttributeName: GSI1PK
          AttributeType: S
        - AttributeName: GSI1SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: GSI1
          KeySchema:
            - AttributeName: GSI1PK
              KeyType: HASH
            - AttributeName: GSI1SK
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      SSESpecification:
        SSEEnabled: true

  EventsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub hr-ecom-events-${Environment}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
        - AttributeName: GSI1PK
          AttributeType: S
        - AttributeName: GSI1SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: GSI1
          KeySchema:
            - AttributeName: GSI1PK
              KeyType: HASH
            - AttributeName: GSI1SK
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      TimeToLiveSpecification:
        AttributeName: expiresAt
        Enabled: true
      SSESpecification:
        SSEEnabled: true

  ConfigTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub hr-ecom-config-${Environment}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      SSESpecification:
        SSEEnabled: true

  EmailCampaignsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub hr-ecom-email-campaigns-${Environment}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
        - AttributeName: GSI1PK
          AttributeType: S
        - AttributeName: GSI1SK
          AttributeType: S
        - AttributeName: GSI2PK
          AttributeType: S
        - AttributeName: GSI2SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: GSI1
          KeySchema:
            - AttributeName: GSI1PK
              KeyType: HASH
            - AttributeName: GSI1SK
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: GSI2
          KeySchema:
            - AttributeName: GSI2PK
              KeyType: HASH
            - AttributeName: GSI2SK
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      SSESpecification:
        SSEEnabled: true

  ReminderEmailsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub hr-ecom-reminder-emails-${Environment}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
        - AttributeName: GSI1PK
          AttributeType: S
        - AttributeName: GSI1SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: GSI1
          KeySchema:
            - AttributeName: GSI1PK
              KeyType: HASH
            - AttributeName: GSI1SK
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      SSESpecification:
        SSEEnabled: true

  UploadBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders: ["*"]
            AllowedMethods: [GET, PUT, POST]
            AllowedOrigins: ["*"]
            MaxAge: 3600

  UploadBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref UploadBucket
      PolicyDocument:
        Statement:
          - Sid: CloudFrontRead
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub ${UploadBucket.Arn}/*
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub arn:aws:cloudfront::${AWS::AccountId}:distribution/${CloudFrontDistribution}

  CloudFrontOriginAccessControl:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub hr-ecom-oac-${Environment}
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        DefaultRootObject: index.html
        Origins:
          - Id: S3Origin
            DomainName: !GetAtt UploadBucket.RegionalDomainName
            S3OriginConfig:
              OriginAccessIdentity: ""
            OriginAccessControlId: !Ref CloudFrontOriginAccessControl
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods: [GET, HEAD, OPTIONS]
          CachedMethods: [GET, HEAD]
          Compress: true
          ForwardedValues:
            QueryString: false

  SesDomainIdentity:
    Type: AWS::SES::EmailIdentity
    Properties:
      EmailIdentity: usarakhi.com
      DkimSigningAttributes:
        NextSigningKeyLength: RSA_2048_BIT

  UserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Sub hr-ecom-users-${Environment}
      AutoVerifiedAttributes: [email]
      UsernameAttributes: [email]
      AccountRecoverySetting:
        RecoveryMechanisms:
          - Name: verified_email
            Priority: 1
      EmailConfiguration:
        EmailSendingAccount: COGNITO_DEFAULT
      VerificationMessageTemplate:
        DefaultEmailOption: CONFIRM_WITH_CODE
        EmailSubject: Verify your UsaRakhi account
        EmailMessage: |
          Welcome to UsaRakhi!

          Your verification code is {####}.

          This code expires in 24 hours. If you did not create an account, you can ignore this email.

          — UsaRakhi Team
          https://www.usarakhi.com
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: false
          RequireUppercase: true
      Schema:
        - Name: email
          Required: true
          Mutable: true
        - Name: name
          Required: false
          Mutable: true

  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: !Sub hr-ecom-web-${Environment}
      UserPoolId: !Ref UserPool
      GenerateSecret: false
      ExplicitAuthFlows:
        - ALLOW_USER_SRP_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
        - ALLOW_USER_PASSWORD_AUTH
      SupportedIdentityProviders: [COGNITO]
      PreventUserExistenceErrors: ENABLED

  AdminGroup:
    Type: AWS::Cognito::UserPoolGroup
    Properties:
      GroupName: admin
      UserPoolId: !Ref UserPool
      Description: Admin portal access

  SuperAdminGroup:
    Type: AWS::Cognito::UserPoolGroup
    Properties:
      GroupName: super-admin
      UserPoolId: !Ref UserPool
      Description: Super admin — full admin access plus delete testing records

  EmailGroup:
    Type: AWS::Cognito::UserPoolGroup
    Properties:
      GroupName: email
      UserPoolId: !Ref UserPool
      Description: Legacy email group — marketing email is now under /admin/email for all admins

  ApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub hr-ecom-api-${Environment}
      Handler: index.handler
      CodeUri: ..
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ProductsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref OrdersTable
        - DynamoDBCrudPolicy:
            TableName: !Ref CartsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref CustomersTable
        - DynamoDBCrudPolicy:
            TableName: !Ref EventsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref ConfigTable
        - DynamoDBCrudPolicy:
            TableName: !Ref EmailCampaignsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref ReminderEmailsTable
        - S3CrudPolicy:
            BucketName: !Ref UploadBucket
        - Statement:
            - Effect: Allow
              Action:
                - secretsmanager:GetSecretValue
                - ssm:GetParameter
              Resource: "*"
            - Effect: Allow
              Action:
                - ses:SendEmail
                - ses:SendRawEmail
                - ses:SendTemplatedEmail
                - ses:SendBulkEmail
                - ses:SendBulkTemplatedEmail
                - sesv2:SendEmail
                - sesv2:SendBulkEmail
                - ses:GetAccountSendingEnabled
                - sesv2:GetAccount
                - sesv2:GetEmailIdentity
              Resource: "*"
      Events:
        ApiRoot:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /{proxy+}
            Method: ANY
        ApiHealth:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /health
            Method: GET
    Metadata:
      BuildMethod: makefile

  ReviewEmailsCronFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub hr-ecom-review-emails-${Environment}
      Handler: scheduled.handler
      Timeout: 120
      CodeUri: ..
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref OrdersTable
        - DynamoDBCrudPolicy:
            TableName: !Ref CartsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref CustomersTable
        - DynamoDBCrudPolicy:
            TableName: !Ref ConfigTable
      Events:
        HourlyReviewEmails:
          Type: Schedule
          Properties:
            Schedule: rate(15 minutes)
            Description: Review request emails + abandoned cart recovery (15 min / 4 hr)
            Enabled: true
    Metadata:
      BuildMethod: makefile

  SesEmailCronFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub hr-ecom-ses-email-${Environment}
      Handler: ses-scheduled.handler
      Timeout: 120
      MemorySize: 512
      CodeUri: ..
      Environment:
        Variables:
          EMAIL_CAMPAIGNS_TABLE: !Ref EmailCampaignsTable
          CONFIG_TABLE: !Ref ConfigTable
          ENVIRONMENT: !Ref Environment
          SITE_URL: https://www.usarakhi.com
          SES_AWS_REGION: us-east-1
          SES_FROM_EMAIL: order@usarakhi.com
          SES_REPLY_TO: order@usarakhi.com
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref EmailCampaignsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref ConfigTable
        - Statement:
            - Effect: Allow
              Action:
                - ses:SendEmail
                - ses:SendRawEmail
                - sesv2:SendEmail
                - sesv2:SendBulkEmail
                - sesv2:GetAccount
              Resource: "*"
      Events:
        EveryMinuteSesQueue:
          Type: Schedule
          Properties:
            Schedule: rate(1 minute)
            Description: SES campaign scheduler + queue sender (respects daily/rate limits)
            Enabled: true
    Metadata:
      BuildMethod: makefile

  HttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: !Ref Environment
      CorsConfiguration:
        AllowMethods: ["GET", "POST", "PUT", "PATCH", "DELETE", "OPTIONS"]
        AllowHeaders: ["Content-Type", "Authorization", "X-Session-Id"]
        AllowOrigins: ["*"]

Outputs:
  ApiUrl:
    Description: HTTP API endpoint
    Value: !Sub https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com/${Environment}
  ProductsTableName:
    Value: !Ref ProductsTable
  OrdersTableName:
    Value: !Ref OrdersTable
  CartsTableName:
    Value: !Ref CartsTable
  CustomersTableName:
    Value: !Ref CustomersTable
  EventsTableName:
    Value: !Ref EventsTable
  ConfigTableName:
    Value: !Ref ConfigTable
  UserPoolId:
    Value: !Ref UserPool
  UserPoolClientId:
    Value: !Ref UserPoolClient
  UploadBucketName:
    Value: !Ref UploadBucket
  CloudFrontDomain:
    Value: !GetAtt CloudFrontDistribution.DomainName
