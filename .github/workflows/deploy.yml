name: Deploy

on:
  push:
    branches:
      - main
      - feature/*
      - dev
  workflow_dispatch:

env:
  AWS_REGION: us-east-1

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: npm
      - run: npm ci
      - run: npm run build

  deploy-api:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: npm
      - run: npm ci
      - run: npm run build -w @hr-ecom/shared

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: aws-actions/setup-sam@v2

      - name: SAM Deploy
        working-directory: infrastructure
        env:
          RAZORPAY_KEY_ID: ${{ secrets.RAZOR_KEY_ID }}
          RAZORPAY_KEY_SECRET: ${{ secrets.RAZOR_KEY_SECRET }}
        run: |
          sam build && sam deploy --no-confirm-changeset --no-fail-on-empty-changeset --config-env prod \
            --parameter-overrides "Environment=prod RazorpayKeyId=${RAZORPAY_KEY_ID} RazorpayKeySecret=${RAZORPAY_KEY_SECRET}"

      - name: Seed UsaRakhi catalog (110 products)
        run: npm run import:usarakhi
        env:
          ENVIRONMENT: prod

  deploy-web:
    runs-on: ubuntu-latest
    needs: deploy-api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: npm
      - run: npm ci
      - run: npm run build -w @hr-ecom/shared
      - run: npm run build -w @hr-ecom/web
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
          NEXT_PUBLIC_RAZORPAY_KEY_ID: ${{ secrets.RAZOR_KEY_ID }}
          NEXT_PUBLIC_COGNITO_USER_POOL_ID: ${{ secrets.NEXT_PUBLIC_COGNITO_USER_POOL_ID }}
          NEXT_PUBLIC_COGNITO_CLIENT_ID: ${{ secrets.NEXT_PUBLIC_COGNITO_CLIENT_ID }}
          NEXT_PUBLIC_COGNITO_REGION: ${{ env.AWS_REGION }}
          NEXT_PUBLIC_COGNITO_DOMAIN: ${{ secrets.NEXT_PUBLIC_COGNITO_DOMAIN }}

      - name: Deploy note
        run: |
          echo "Connect AWS Amplify to this repo — amplify.yml is configured."
          echo "Set Amplify env: RAZOR_KEY_ID (same as GitHub secret) for Razorpay checkout."
